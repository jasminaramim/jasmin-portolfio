<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JASMIN | Frontend & MERN Stack Developer</title>
    <link rel="icon" type="image/png" href="/logo.png" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Plus Jakarta Sans', sans-serif;
        background-color: #000;
        color: #fff;
        overflow-x: hidden;
      }
      .glass {
        background: rgba(255, 255, 255, 0.03);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.05);
      }
      .purple-glow {
        text-shadow: 0 0 20px rgba(75, 0, 130, 0.8);
      }
      .pink-glow {
        text-shadow: 0 0 20px rgba(255, 105, 180, 0.8);
      }
      .bg-luxury-gradient {
        background: linear-gradient(135deg, #4B0082 0%, #FF69B4 100%);
      }
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #000;
      }
      ::-webkit-scrollbar-thumb {
        background: #333;
        border-radius: 10px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #FF69B4;
      }
      .tech-grid {
        background-image: radial-gradient(#4B0082 0.5px, transparent 0.5px);
        background-size: 30px 30px;
        opacity: 0.1;
      }
      .breadcrumb-bg {
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
      }
      @keyframes marquee {
        0% { transform: translateX(0); }
        100% { transform: translateX(-50%); }
      }
      .animate-marquee {
        animation: marquee 40s linear infinite;
      }
      .pink-border-glow:hover {
        box-shadow: 0 0 30px rgba(255, 105, 180, 0.2);
        border-color: rgba(255, 105, 180, 0.4);
      }
    </style>
    <script type="importmap">

      "imports": {

        "react-dom/": "https://esm.sh/react-dom@19.0.0/",
        "framer-motion": "https://esm.sh/framer-motion@11.11.17?external=react,react-dom",
        "lucide-react": "https://esm.sh/lucide-react@0.460.0?external=react"
      }
    }
    </script>

</head>

    <div id="root"></div>

</body>
</html>
